version: '3.8'

services:
  # 1. Database Container (MySQL 8.0)
  # Port 3306 is NOT mapped to the host for security. Only accessible inside the Docker network.
  mysql-db:
    image: mysql:8.0
    container_name: ecommerce-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_db}
    volumes:
      - mysql-data:/var/lib/mysql
      # Mount the schema.sql to auto-initialize tables and seed data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ecommerce-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Java Spring Boot REST API Container
  # Pulls the pre-built image from Docker Hub instead of building from source on EC2.
  backend:
    image: ${DOCKERHUB_USERNAME:-preethamvs6}/ecommerce-backend:latest
    container_name: ecommerce-backend-prod
    restart: always
    ports:
      - "8080:8080" # Exposed for API documentation/direct access, can be restricted by SG
    environment:
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-ecommerce_db}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 3. React Frontend Container served via Nginx on standard HTTP port 80
  frontend:
    image: ${DOCKERHUB_USERNAME:-preethamvs6}/ecommerce-frontend:latest
    container_name: ecommerce-frontend-prod
    restart: always
    ports:
      - "80:80" # Exposed to internet for direct user access
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Prometheus Metrics Scraper (Exposed on local interface only or private network)
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus-prod
    restart: always
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "127.0.0.1:9090:9090" # Restricted to localhost access for security
    depends_on:
      - backend
    networks:
      - ecommerce-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. Grafana Visualization Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana-prod
    restart: always
    ports:
      - "3001:3000" # Accessible on port 3001
    depends_on:
      - prometheus
    networks:
      - ecommerce-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql-data:

networks:
  ecommerce-network:
    driver: bridge
