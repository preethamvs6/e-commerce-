version: '3.8'

services:
  # 1. Database Container (MySQL 8.0)
  mysql-db:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Mount the schema.sql to auto-initialize tables and seed data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Java Spring Boot REST API Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_NAME=ecommerce_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 3. React Frontend Container served via Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-network

  # 4. Prometheus Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    restart: always
    volumes:
      - ./prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - ecommerce-network

  # 5. Grafana Visualization Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

volumes:
  mysql-data:

networks:
  ecommerce-network:
    driver: bridge
