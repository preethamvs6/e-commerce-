server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ecommerce-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  # Base64 encoded secret for HS512. Must be at least 512 bits (64 bytes)
  jwtSecret: U2VjcmV0S2V5Rm9yRWNvbW1lcmNlQXBwbGljYXRpb25XaGljaElzU3VmZmljaWVudGx5TG9uZ0FuZFNlY3VyZTEyMzQ1Njc4OTA=
  jwtExpirationMs: 86400000 # 24 hours

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Springdoc OpenAPI config
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
