name: E-Commerce CI/CD & Code Quality Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of SonarQube analysis

    # 1. Set up Java 17 for Backend
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 2. Build & Test Spring Boot Backend
    - name: Build and Test Backend
      run: |
        cd backend
        mvn clean test

    # 3. SonarQube Scanning (Code Quality Analysis)
    - name: SonarQube Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        cd backend
        # Triggers SonarQube scanner for Maven project analysis
        mvn sonar:sonar -Dsonar.projectKey=ecommerce-platform -Dsonar.projectName="E-Commerce Full Stack Platform" || echo "SonarQube credentials missing, skipping scanning stage."

    # 4. Set up Node.js for Frontend
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    # 5. Build React Frontend
    - name: Install and Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    # 6. Set up Docker Buildx for multi-platform support
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 7. Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 8. Build & Push Backend Docker Image
    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend:${{ github.sha }}

    # 9. Build & Push Frontend Docker Image
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend:${{ github.sha }}
